  <text x="475" y="461" text-anchor="middle" font-size="8" fill="#666">+ No ORCID</text>
  <circle cx="350" cy="498" r="22" fill="#EF9F27" stroke="#C78B1F" stroke-width="3"/>
  <text x="350" y="499" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF" dominant-baseline="central">CP-3</text>
  <rect x="190" y="525" width="320" height="56" rx="8" fill="#5BC4A8" stroke="#3A9B7E" stroke-width="2"/>
  <text x="350" y="547" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">Phase 5</text>
  <text x="350" y="569" text-anchor="middle" font-size="11" fill="#FFF">Submission Form Filling</text>
  <rect x="230" y="600" width="130" height="38" rx="6" fill="#D4EDDA" stroke="#6B9B72"/>
