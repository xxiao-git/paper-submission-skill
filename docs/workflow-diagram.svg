  <text x="350" y="54" text-anchor="middle" font-size="11" fill="#FFF">Information Collection</text>
  <circle cx="570" cy="38" r="22" fill="#EF9F27" stroke="#C78B1F" stroke-width="3"/>
  <text x="570" y="39" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF" dominant-baseline="central">CP-0</text>
  <rect x="190" y="90" width="320" height="56" rx="8" fill="#5BC4A8" stroke="#3A9B7E" stroke-width="2"/>
  <text x="350" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">Phase 2</text>
  <text x="350" y="134" text-anchor="middle" font-size="11" fill="#FFF">Guideline Interpretation</text>
  <circle cx="570" cy="118" r="22" fill="#EF9F27" stroke="#C78B1F" stroke-width="3"/>
  <text x="570" y="119" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF" dominant-baseline="central">CP-1</text>
  <rect x="190" y="170" width="320" height="56" rx="8" fill="#5BC4A8" stroke="#3A9B7E" stroke-width="2"/>
  <text x="350" y="192" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">Phase 3</text>
