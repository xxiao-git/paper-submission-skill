<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 740" width="100%" role="img">
<title>paper-submission skill workflow diagram</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  .phase { font: 500 13px var(--font-sans, system-ui); fill: #2C2C2A; }
  .cp { font: 400 12px var(--font-sans, system-ui); fill: #2C2C2A; }
  .stop { font: 500 13px var(--font-sans, system-ui); fill: #FFFFFF; }
  .branch { font: 400 11px var(--font-sans, system-ui); fill: #5F5E5A; }
</style>

<text x="340" y="28" text-anchor="middle" class="phase" style="font-size:15px">paper-submission workflow</text>

<g>
  <rect x="180" y="50" width="320" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="70" text-anchor="middle" dominant-baseline="central" class="phase">Phase 1: information collection</text>
</g>

<g>
  <rect x="520" y="54" width="100" height="32" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="70" text-anchor="middle" dominant-baseline="central" class="cp">CP-0: confirm</text>
</g>
<line x1="500" y1="70" x2="520" y2="70" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4,3"/>

<g>
  <rect x="180" y="110" width="320" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="130" text-anchor="middle" dominant-baseline="central" class="phase">Phase 2: guideline interpretation</text>
</g>

<g>
  <rect x="520" y="114" width="100" height="32" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="130" text-anchor="middle" dominant-baseline="central" class="cp">CP-1: confirm</text>
</g>
<line x1="500" y1="130" x2="520" y2="130" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4,3"/>

<line x1="340" y1="90" x2="340" y2="110" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
  <rect x="180" y="170" width="320" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="190" text-anchor="middle" dominant-baseline="central" class="phase">Phase 3: file preprocessing</text>
</g>

<g>
  <rect x="520" y="174" width="100" height="32" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="190" text-anchor="middle" dominant-baseline="central" class="cp">CP-2: confirm</text>
</g>
<line x1="500" y1="190" x2="520" y2="190" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4,3"/>

<line x1="340" y1="150" x2="340" y2="170" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
  <rect x="180" y="230" width="320" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="250" text-anchor="middle" dominant-baseline="central" class="phase">Phase 4: account login / registration</text>
</g>

<g>
  <rect x="520" y="234" width="100" height="32" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="250" text-anchor="middle" dominant-baseline="central" class="cp">CP-3: confirm</text>
</g>
<line x1="500" y1="250" x2="520" y2="250" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="4,3"/>

<line x1="340" y1="210" x2="340" y2="230" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<text x="340" y="284" text-anchor="middle" class="branch">A: existing account / B: ORCID / C: email register</text>

<g>
  <rect x="180" y="300" width="320" height="40" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="320" text-anchor="middle" dominant-baseline="central" class="phase">Phase 5: system form filling</text>
</g>

<line x1="340" y1="292" x2="340" y2="300" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
  <rect x="220" y="355" width="240" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="371" text-anchor="middle" dominant-baseline="central" class="cp">Step 1: files</text>
</g>

<g>
  <rect x="520" y="355" width="100" height="32" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="371" text-anchor="middle" dominant-baseline="central" class="cp">CP-4: confirm</text>
</g>
<line x1="460" y1="371" x2="520" y2="371" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4,3"/>

<g>
  <rect x="220" y="400" width="240" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="416" text-anchor="middle" dominant-baseline="central" class="cp">Step 2: details</text>
</g>

<g>
  <rect x="220" y="445" width="240" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="461" text-anchor="middle" dominant-baseline="central" class="cp">Step 3: authors</text>
</g>

<g>
  <rect x="220" y="490" width="240" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="506" text-anchor="middle" dominant-baseline="central" class="cp">Step 4: declarations</text>
</g>

<g>
  <rect x="220" y="535" width="240" height="32" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="551" text-anchor="middle" dominant-baseline="central" class="cp">Step 5: review</text>
</g>

<g>
  <rect x="520" y="535" width="100" height="32" rx="16" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="570" y="551" text-anchor="middle" dominant-baseline="central" class="cp">CP-5: review</text>
</g>
<line x1="460" y1="551" x2="520" y2="551" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4,3"/>

<line x1="340" y1="387" x2="340" y2="400" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="432" x2="340" y2="445" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="477" x2="340" y2="490" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="522" x2="340" y2="535" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<line x1="340" y1="340" x2="340" y2="355" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
  <rect x="120" y="590" width="440" height="48" rx="8" fill="#E24B4A" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="608" text-anchor="middle" dominant-baseline="central" class="stop">human review report generated — STOP here</text>
  <text x="340" y="628" text-anchor="middle" dominant-baseline="central" style="font:400 11px var(--font-sans,system-ui);fill:#FCEBEB">user clicks submit button manually</text>
</g>

<line x1="340" y1="567" x2="340" y2="590" stroke="#444441" stroke-width="0.5" marker-end="url(#arrow)"/>

<g>
  <rect x="40" y="660" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="56" y="666" text-anchor="start" dominant-baseline="central" style="font:400 11px var(--font-sans,system-ui);fill:#5F5E5A">phase</text>

  <rect x="40" y="678" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="56" y="684" text-anchor="start" dominant-baseline="central" style="font:400 11px var(--font-sans,system-ui);fill:#5F5E5A">sub-step</text>

  <rect x="40" y="696" width="12" height="12" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="56" y="702" text-anchor="start" dominant-baseline="central" style="font:400 11px var(--font-sans,system-ui);fill:#5F5E5A">checkpoint (user confirm)</text>

  <rect x="40" y="714" width="12" height="12" rx="3" fill="#E24B4A" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="56" y="720" text-anchor="start" dominant-baseline="central" style="font:400 11px var(--font-sans,system-ui);fill:#5F5E5A">AI stop — human action required</text>
</g>

</svg>