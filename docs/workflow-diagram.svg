  <rect x="370" y="600" width="130" height="38" rx="6" fill="#D4EDDA" stroke="#6B9B72"/>
  <text x="435" y="618" text-anchor="middle" font-size="10" fill="#333">Build PDF</text>
  <text x="435" y="630" text-anchor="middle" font-size="8" fill="#666">+ AI Auto-Check</text>
  <circle cx="350" cy="668" r="22" fill="#EF9F27" stroke="#C78B1F" stroke-width="3"/>
  <text x="350" y="669" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFF" dominant-baseline="central">CP-5</text>
  <rect x="250" y="710" width="200" height="48" rx="8" fill="#F5C4B3" stroke="#C47A52" stroke-width="2"/>
  <text x="350" y="734" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1A1A">User Confirms -&gt; Submit</text>
  <text x="350" y="752" text-anchor="middle" font-size="11" fill="#666">Final submission</text>
