  <rect x="190" y="355" width="320" height="56" rx="8" fill="#5BC4A8" stroke="#3A9B7E" stroke-width="2"/>
  <text x="350" y="377" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFF">Phase 4</text>
  <text x="350" y="399" text-anchor="middle" font-size="11" fill="#FFF">Account Login / Registration</text>
